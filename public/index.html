<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa Pro | Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 35px rgba(59, 130, 246, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans bg-grid">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center p-4 transition-all duration-700">
        <div class="max-w-sm w-full bg-slate-900/90 backdrop-blur-md p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center relative overflow-hidden">
            
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-600/10 rounded-full blur-3xl"></div>

            <div class="relative z-10 w-28 h-28 bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-xl shadow-blue-900/40 border border-blue-400/30 rotate-3 hover:rotate-0 transition-transform duration-500">
                <i class="fas fa-project-diagram text-5xl text-white drop-shadow-md"></i>
            </div>

            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter uppercase">CineUiepa</h2>
            <p class="text-blue-500 text-[10px] mb-8 uppercase tracking-[0.4em] font-black italic">Sistemas Distribuidos</p>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Tu nombre de usuario..." 
                    class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl p-4 text-white text-center focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-600 font-medium">
                
                <button onclick="entrar()" 
                    class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-lg shadow-blue-900/40 transition-all active:scale-95 uppercase tracking-widest">
                    Iniciar Sesión
                </button>
            </div>
            
            <p class="mt-8 text-[9px] text-slate-500 font-bold uppercase tracking-tighter">UIEPA • AHUACATLÁN, PUEBLA</p>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        
        <aside class="w-full md:w-80 bg-slate-900/50 backdrop-blur-md border-r border-slate-800 p-8 flex flex-col">
            <div class="flex items-center gap-4 mb-12">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                    <i class="fas fa-server text-white text-xl"></i>
                </div>
                <div>
                    <span class="block font-black text-xl tracking-tighter text-white leading-none">CineUiepa</span>
                    <span class="text-[9px] text-blue-500 font-bold tracking-widest uppercase">Console v2.0</span>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <div class="bg-slate-800/40 p-5 rounded-[2rem] border border-slate-700/30 mb-8">
                    <p class="text-[10px] uppercase font-black text-slate-500 mb-2 tracking-widest">Operador Local</p>
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <p id="display-name" class="font-bold text-white text-lg tracking-tight">---</p>
                    </div>
                </div>

                <p class="text-[10px] uppercase font-black text-slate-500 mb-4 tracking-widest flex items-center gap-2">
                    <i class="fas fa-terminal text-[8px]"></i> Logs del Sistema
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 space-y-3">
                <button onclick="reiniciar()" class="group bg-slate-800/30 hover:bg-rose-600/10 border border-slate-700 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-slate-400 hover:text-rose-500 uppercase flex items-center justify-center gap-3">
                    <i class="fas fa-sync-alt group-hover:rotate-180 transition-transform duration-500"></i> Reiniciar Nodo
                </button>
                <button onclick="salir()" class="bg-slate-800/10 hover:bg-slate-800 border border-slate-700 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-slate-500 hover:text-white uppercase">
                    Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-16 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-center md:items-end mb-16 gap-6">
                    <div class="text-center md:text-left">
                        <h1 class="text-5xl font-black text-white mb-3 tracking-tighter italic">Cinema Manager</h1>
                        <p class="text-slate-500 text-sm font-bold tracking-widest flex items-center justify-center md:justify-start gap-3">
                            <i class="fas fa-microchip text-blue-500"></i> PROTOCOLO DE RESERVA DISTRIBUIDA
                        </p>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 px-10 rounded-[2.5rem] text-center glow-blue">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-1">Disponibilidad</p>
                        <p id="count-libres" class="text-5xl font-black text-blue-500 leading-none">0</p>
                    </div>
                </div>

                <div class="bg-slate-900/40 p-10 md:p-20 rounded-[5rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-3/4 h-2 bg-gradient-to-r from-transparent via-blue-500 to-transparent mx-auto mb-24 rounded-full shadow-[0_0_50px_rgba(59,130,246,0.5)]"></div>
                    
                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-8"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            
            const login = document.getElementById('login-screen');
            login.style.opacity = '0';
            login.style.transform = 'translateY(-20px)';
            
            setTimeout(() => {
                login.classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            }, 600);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                
                btn.className = `h-32 rounded-[2.5rem] border-2 flex flex-col items-center justify-center transition-all duration-300
                    ${ocupante 
                        ? (esMio ? 'bg-blue-600 border-blue-400 shadow-lg shadow-blue-900/40 scale-95' : 'bg-slate-900/50 border-slate-800 opacity-30 cursor-not-allowed grayscale') 
                        : 'bg-slate-800/40 border-slate-700 hover:border-emerald-500 hover:bg-slate-800 hover:scale-105 hover:shadow-xl'}`;
                
                btn.innerHTML = `
                    <span class="text-[11px] font-black mb-2 ${ocupante ? 'text-blue-100' : 'text-slate-600'}">A-${i + 1}</span>
                    <i class="fas ${ocupante ? 'fa-couch' : 'fa-couch'} text-2xl"></i>
                    ${ocupante ? `<span class="text-[10px] mt-3 font-black uppercase truncate px-2 w-full text-center tracking-tighter">${ocupante}</span>` : ''}
                `;
                
                btn.onclick = () => { if(!ocupante || esMio) socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.slice().reverse().forEach(item => {
                const log = document.createElement('div');
                log.className = "p-4 rounded-2xl bg-slate-800/40 border border-slate-700/30 text-[10px] animate-fadeIn";
                log.innerHTML = `<div class="flex justify-between mb-1"><span class="font-black text-blue-400">${item.usuario}</span><span class="opacity-40 font-mono">${item.fecha}</span></div><span class="text-slate-300 font-medium">${item.accion}</span>`;
                histDiv.appendChild(log);
            });
        });

        function reiniciar() { if(confirm('¿Reiniciar todos los nodos del sistema?')) socket.emit('limpiar_todo', { usuario: miNombre }); }
        function salir() { if(confirm('¿Finalizar sesión distribuida?')) location.reload(); }
    </script>
</body>
</html>
