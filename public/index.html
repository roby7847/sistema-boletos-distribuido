<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa Pro | Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center p-4 transition-all duration-500">
        <div class="max-w-sm w-full bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center relative overflow-hidden">
            
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>

            <div class="relative z-10 w-32 h-32 bg-gradient-to-tr from-blue-700 to-indigo-600 rounded-full mx-auto mb-10 flex items-center justify-center shadow-2xl border-2 border-blue-500/30">
                <svg viewBox="0 0 24 24" class="w-20 h-20 fill-white opacity-90" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22l-2.1-2.5C6.4 15.1 4 12.2 4 9.5c0-2.5 1.5-4.5 4-4.5.9 0 1.8.3 2.5.8.5-.4 1.1-.7 1.7-.8V2h2v3c.6.1 1.2.4 1.7.8.7-.5 1.6-.8 2.5-.8 2.5 0 4 2 4 4.5 0 2.7-2.4 5.6-5.9 10L12 22zm0-15.5c-1.4 0-2.5 1.1-2.5 2.5s1.1 2.5 2.5 2.5 2.5-1.1 2.5-2.5-1.1-2.5-2.5-2.5zM7 9.5c0 1.4 1.1 2.5 2.5 2.5h.5c.3 0 .5-.2.5-.5V9c0-1.1-.9-2-2-2h-1c-.3 0-.5.2-.5.5zm10 0c0-.3-.2-.5-.5-.5h-1c-1.1 0-2 .9-2 2v2.5c0 .3.2.5.5.5h.5c1.4 0 2.5-1.1 2.5-2.5zM12 4c-1.1 0-2 .9-2 2v.5h4V6c0-1.1-.9-2-2-2z"/>
                </svg>
            </div>

            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter">CineUiepa</h2>
            <p class="text-slate-500 text-[10px] mb-10 uppercase tracking-[0.2em] font-bold text-center">BIENVENIDOS</p>
            
            <input type="text" id="username" placeholder="Tu nombre..." class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white text-center mb-5 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-600">
            
            <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                ACCEDER AL PANEL
            </button>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        <aside class="w-full md:w-72 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i class="fas fa-network-wired text-white"></i>
                </div>
                <span class="font-black text-xl tracking-tighter text-white">CineUiepa</span>
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Usuario Activo</p>
                    <p id="display-name" class="font-bold text-blue-400 text-lg">---</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-3 tracking-widest flex items-center gap-2">
                    <i class="fas fa-history text-[8px]"></i> Historial en tiempo real
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-2"></div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="reiniciar()" class="group bg-slate-800/50 hover:bg-rose-600/10 border border-slate-700 p-4 rounded-2xl transition-all w-full text-[10px] font-bold text-slate-400 hover:text-rose-500 uppercase flex items-center justify-center gap-2">
                    <i class="fas fa-redo-alt"></i> REINICIAR TABLERO
                </button>
                <button onclick="salir()" class="bg-slate-800/20 hover:bg-slate-800 border border-slate-700 p-4 rounded-2xl transition-all w-full text-[10px] font-bold text-slate-500 hover:text-white uppercase text-center">
                    CERRAR SESIÓN
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 bg-slate-950 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-end mb-12 text-center">
                    <div class="text-left">
                        <h1 class="text-4xl font-black text-white mb-2">Panel de Control</h1>
                        <p class="text-slate-500 flex items-center gap-2 text-sm uppercase font-bold">
                            <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                            Red UIEPA Activa
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Disponibles</p>
                        <p id="count-libres" class="text-5xl font-black text-blue-500">0</p>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-8 md:p-16 rounded-[4rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-4/5 h-1.5 bg-gradient-to-r from-transparent via-blue-500/50 to-transparent mx-auto mb-20 rounded-full shadow-[0_0_40px_rgba(59,130,246,0.4)]"></div>
                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 gap-6"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            }, 500);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                btn.className = `h-28 rounded-[2rem] border-2 flex flex-col items-center justify-center transition-all ${ocupante ? (esMio ? 'bg-blue-600 border-blue-400 glow-blue scale-95' : 'bg-slate-900 border-rose-900/40 opacity-40 cursor-not-allowed') : 'bg-slate-800/30 border-slate-800 hover:border-emerald-500 hover:scale-105'}`;
                btn.innerHTML = `<span class="text-[10px] font-black mb-1 ${ocupante ? 'text-blue-100' : 'text-slate-600'}">${i + 1}</span><i class="fas ${ocupante ? (esMio ? 'fa-check-circle' : 'fa-user-lock') : 'fa-couch'} text-xl"></i>${ocupante ? `<span class="text-[9px] mt-2 font-bold uppercase truncate px-1 w-full text-center">${ocupante}</span>` : ''}`;
                btn.onclick = () => { if(!ocupante || esMio) socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.forEach(item => {
                const log = document.createElement('div');
                log.className = "p-3 rounded-xl bg-slate-800/40 border border-slate-800/60 text-[10px] mb-2";
                log.innerHTML = `<div class="flex justify-between text-slate-500 mb-1"><span class="font-bold text-blue-500">${item.usuario}</span><span>${item.fecha}</span></div><span>${item.accion}</span>`;
                histDiv.appendChild(log);
            });
        });

        function reiniciar() { if(confirm('¿Reiniciar todo?')) socket.emit('limpiar_todo', { usuario: miNombre }); }
        function salir() { if(confirm('¿Cerrar sesión?')) location.reload(); }
    </script>
</body>
</html>
