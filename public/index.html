<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa | Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .transition-opacity { transition: opacity 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950/98 backdrop-blur-xl flex items-center justify-center p-4 transition-opacity">
        <div class="max-w-sm w-full bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl text-center">
            <div class="w-24 h-24 bg-gradient-to-tr from-blue-700 to-indigo-500 rounded-3xl mx-auto mb-10 flex items-center justify-center shadow-xl shadow-blue-600/10">
                <i class="fas fa-hat-wizard text-5xl text-white"></i> 
            </div>
            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter">CineUiepa</h2>
            <p class="text-slate-500 text-xs mb-10 italic uppercase tracking-widest">Sistemas Distribuidos</p>
            <input type="text" id="username" placeholder="Ingresa tu nombre..." class="w-full bg-slate-800/60 border border-slate-700 rounded-2xl p-4 text-white text-center mb-5 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                ACCEDER AL PANEL
            </button>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        
        <aside class="w-full md:w-72 bg-slate-900/60 backdrop-blur-lg p-6 flex flex-col border-r border-slate-800">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-server text-white"></i></div>
                <span class="font-black text-xl tracking-tighter text-white">CineUiepa</span>
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Usuario Activo</p>
                    <p id="display-name" class="font-bold text-blue-400 text-lg">---</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-3 tracking-widest flex items-center gap-2">
                    <i class="fas fa-list-ul"></i> Historial Global
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-2">
                    </div>
            </div>

            <div class="mt-8 space-y-2">
                <button onclick="reiniciar()" class="group bg-slate-800/50 hover:bg-rose-600/20 border border-slate-700 hover:border-rose-500/50 p-4 rounded-2xl transition-all flex items-center justify-center gap-3 w-full">
                    <i class="fas fa-sync-alt text-slate-400 group-hover:text-rose-500 group-hover:rotate-180 transition-all duration-500"></i>
                    <span class="text-xs font-bold text-slate-300 group-hover:text-rose-500">RESET TABLERO</span>
                </button>
                <button onclick="salir()" class="group bg-slate-800/30 hover:bg-slate-700 border border-slate-700 p-4 rounded-2xl transition-all flex items-center justify-center gap-3 w-full">
                    <i class="fas fa-sign-out-alt text-slate-500 group-hover:text-white"></i>
                    <span class="text-xs font-bold text-slate-500 group-hover:text-white">CERRAR SESIÓN</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 bg-slate-950 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h1 class="text-4xl font-black text-white mb-2 tracking-tight">Panel de Control</h1>
                        <p class="text-slate-400 flex items-center gap-2">
                            <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                            Servidor UIEPA: En Línea
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-500 uppercase">Disponibles</p>
                        <p id="count-libres" class="text-4xl font-black text-blue-500">0</p>
                    </div>
                </div>

                <div class="bg-slate-900 p-8 md:p-12 rounded-[3.5rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-3/4 h-1.5 bg-gradient-to-r from-transparent via-blue-500/70 to-transparent mx-auto mb-16 rounded-full shadow-[0_0_30px_rgba(59,130,246,0.6)]"></div>

                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 gap-6">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            }, 400);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            
            // Asientos
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                
                btn.className = `group relative h-24 rounded-[1.8rem] transition-all duration-300 border-2 flex flex-col items-center justify-center
                    ${ocupante 
                        ? (esMio ? 'bg-blue-600 border-blue-400 glow-blue scale-95' : 'bg-slate-900 border-rose-900/60 opacity-60 cursor-not-allowed') 
                        : 'bg-slate-800/40 border-slate-700 hover:border-emerald-500 hover:bg-slate-800/80 hover:scale-105'}`;
                
                btn.innerHTML = `
                    <span class="text-[11px] font-black mb-1 ${ocupante ? 'text-blue-100' : 'text-slate-500'}">${i + 1}</span>
                    <i class="fas ${ocupante ? (esMio ? 'fa-check-circle' : 'fa-minus-circle') : 'fa-couch'} text-xl"></i>
                    ${ocupante ? `<span class="text-[9px] mt-1.5 font-bold truncate max-w-[80%]">${ocupante}</span>` : ''}
                `;
                
                btn.onclick = () => { socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;

            // Historial
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.forEach(item => {
                const log = document.createElement('div');
                log.className = "p-3 rounded-xl bg-slate-800/40 border border-slate-800/60 text-[11px]";
                log.innerHTML = `
                    <div class="flex justify-between text-slate-500 mb-1">
                        <span class="font-bold text-blue-400">${item.usuario}</span>
                        <span>${item.fecha}</span>
                    </div>
                    <span class="text-slate-300">${item.accion}</span>
                `;
                histDiv.appendChild(log);
            });
        });

        function reiniciar() {
            if(confirm('¿Reiniciar todo el tablero distribuido?')) socket.emit('limpiar_todo', { usuario: miNombre });
        }

        function salir() {
            if(confirm('¿Estás seguro de que quieres salir?')) {
                miNombre = ""; 
                document.getElementById('username').value = ""; 
                document.getElementById('main-panel').classList.add('hidden'); 
                document.getElementById('login-screen').classList.remove('hidden'); 
                document.getElementById('login-screen').style.opacity = '1';
            }
        }
    </script>
</body>
</html>
