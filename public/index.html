<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa | ITI Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 35px rgba(59, 130, 246, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        
        @keyframes balanceo {
            0% { transform: rotate(5deg) translateY(0px); }
            50% { transform: rotate(-5deg) translateY(-10px); }
            100% { transform: rotate(5deg) translateY(0px); }
        }
        .icono-animado { animation: balanceo 3s ease-in-out infinite; }

        @keyframes pulso-luz {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .efecto-pulso { animation: pulso-luz 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans bg-grid">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center p-4 transition-all duration-500">
        <div class="max-w-sm w-full bg-slate-900/90 backdrop-blur-md p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/20 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-600/10 rounded-full blur-3xl"></div>

            <div class="relative z-10 w-28 h-28 bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl border border-blue-400/30 icono-animado efecto-pulso">
                <i class="fas fa-project-diagram text-5xl text-white drop-shadow-md"></i>
            </div>

            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter uppercase">CineUiepa</h2>
            <p class="text-blue-500 text-[10px] mb-8 uppercase tracking-[0.4em] font-black italic">ITI - Sistemas Distribuidos</p>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Ingresa tu nombre..." 
                    class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl p-4 text-white text-center focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-600 font-bold">
                <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-lg shadow-blue-900/40 transition-all active:scale-95 uppercase tracking-widest">
                    Iniciar Sesión
                </button>
            </div>
            <p class="mt-8 text-[9px] text-slate-500 font-bold uppercase tracking-tighter">UIEPA • AHUACATLÁN, PUEBLA</p>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen animate-fadeIn">
        <aside class="w-full md:w-80 bg-slate-900/50 backdrop-blur-md border-r border-slate-800 p-8 flex flex-col">
            <div class="flex items-center gap-4 mb-10">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-server text-white text-xl"></i></div>
                <div>
                    <span class="block font-black text-xl tracking-tighter text-white">CineUiepa</span>
                    <span id="ping-text" class="text-[9px] text-emerald-500 font-bold tracking-widest uppercase">Red: 0ms</span>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <div class="bg-slate-800/40 p-5 rounded-[2rem] border border-slate-700/30 mb-8">
                    <p class="text-[10px] uppercase font-black text-slate-500 mb-2">Usuario Conectado</p>
                    <p id="display-name" class="font-bold text-white text-lg italic">---</p>
                </div>
                <p class="text-[10px] uppercase font-black text-slate-500 mb-4 flex items-center gap-2"><i class="fas fa-terminal text-[8px]"></i> Historial de acientos</p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 space-y-3">
                <button onclick="exportar()" class="bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/20 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-blue-400 uppercase">
                    Descargar Ficha
                </button>
                <button onclick="reiniciar()" class="bg-slate-800 hover:bg-rose-600/20 border border-slate-700 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-slate-400 hover:text-rose-500 uppercase">
                    Reiniciar Servidor
                </button>
                <button onclick="regresarLogin()" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-slate-500 hover:text-white uppercase flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-16 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-col md:flex-row justify-between items-center md:items-end mb-16 gap-6">
                    <div>
                        <h1 class="text-5xl font-black text-white mb-3 tracking-tighter italic uppercase">Control Sala</h1>
                        <p class="text-slate-500 text-[10px] font-black tracking-[0.3em]">ITI </p>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 px-10 rounded-[2.5rem] glow-blue">
                        <p id="count-libres" class="text-5xl font-black text-blue-500 leading-none">0</p>
                        <p class="text-[10px] font-black text-slate-500 uppercase mt-1">Libres</p>
                    </div>
                </div>
                <div class="bg-slate-900/40 p-10 md:p-20 rounded-[5rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-3/4 h-2 bg-gradient-to-r from-transparent via-blue-500 to-transparent mx-auto mb-24 rounded-full shadow-[0_0_50px_rgba(59,130,246,0.5)]"></div>
                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-8"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";
        let logsFull = [];
        let pingInterval;

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
            
            pingInterval = setInterval(() => {
                const start = Date.now();
                socket.emit("ping", () => {
                    document.getElementById('ping-text').innerText = `Red: ${Date.now() - start}ms`;
                });
            }, 3000);
        }

        // FUNCIÓN PARA VOLVER AL LOGIN
        function regresarLogin() {
            if(confirm('¿Deseas cerrar la sesión de este nodo?')) {
                clearInterval(pingInterval);
                document.getElementById('main-panel').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('username').value = "";
            }
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            logsFull = historial;
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                btn.className = `h-32 rounded-[2rem] border-2 flex flex-col items-center justify-center transition-all duration-300
                    ${ocupante ? (esMio ? 'bg-blue-600 border-blue-400 shadow-xl glow-blue scale-95' : 'bg-slate-900/50 border-slate-800 opacity-20 cursor-not-allowed') : 'bg-slate-800/40 border-slate-700 hover:border-emerald-500 hover:scale-105'}`;
                btn.innerHTML = `<span class="text-[10px] font-black mb-2">${i + 1}</span><i class="fas fa-couch text-2xl"></i><span class="text-[9px] mt-3 font-black uppercase truncate px-2 w-full text-center">${ocupante || 'Libre'}</span>`;
                btn.onclick = () => { socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.slice().reverse().forEach(item => {
                const log = document.createElement('div');
                log.className = "p-4 rounded-2xl bg-slate-800/40 border border-slate-700/30 text-[10px] mb-2";
                log.innerHTML = `<div class="flex justify-between mb-1"><span class="font-black text-blue-400">${item.usuario}</span><span class="opacity-40 font-mono">${item.fecha}</span></div><span>${item.accion}</span>`;
                histDiv.appendChild(log);
            });
        });

        function exportar() {
            let txt = "BITÁCORA CINEUIEPA\n\n";
            logsFull.forEach(l => txt += `[${l.fecha}] ${l.usuario}: ${l.accion}\n`);
            const blob = new Blob([txt], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "bitacora.txt";
            link.click();
        }

        function reiniciar() { if(confirm('¿Reiniciar sistema?')) socket.emit('limpiar_todo', { usuario: miNombre }); }
    </script>
</body>
</html>
