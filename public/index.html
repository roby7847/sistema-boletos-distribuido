<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine | UIEPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-200 overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-4">
        <div class="max-w-sm w-full bg-slate-800 p-10 rounded-[2.5rem] border border-slate-700 shadow-2xl text-center">
            <div class="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-2xl mx-auto mb-8 flex items-center justify-center shadow-xl">
                <i class="fas fa-ticket-alt text-3xl text-white"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 text-white">Cine-Uiepa</h2>
            <p class="text-slate-400 text-sm mb-8 italic">Sistemas Distribuidos · UIEPA</p>
            <input type="text" id="username" placeholder="Tu nombre de usuario..." class="w-full bg-slate-700/50 border border-slate-600 rounded-2xl p-4 text-white text-center mb-4 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                INGRESAR AL PANEL
            </button>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        
        <aside class="w-full md:w-72 bg-slate-800/50 backdrop-blur-lg p-6 flex flex-col border-r border-slate-700">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg"><i class="fas fa-server text-white"></i></div>
                <span class="font-black text-xl tracking-tighter text-white">CineUiepa</span>
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-slate-700/30 p-4 rounded-2xl border border-slate-600">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Usuario Activo</p>
                    <p id="display-name" class="font-bold text-blue-400 text-lg">---</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-3 tracking-widest flex items-center gap-2">
                    <i class="fas fa-list-ul"></i> Historial Distribuido
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-2">
                    </div>
            </div>

            <button onclick="reiniciar()" class="mt-6 group bg-slate-700/50 hover:bg-rose-600/20 border border-slate-600 hover:border-rose-500/50 p-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                <i class="fas fa-sync-alt text-slate-400 group-hover:text-rose-500 group-hover:rotate-180 transition-all duration-500"></i>
                <span class="text-sm font-bold text-slate-300 group-hover:text-rose-500">RESET TABLERO</span>
            </button>
        </aside>

        <main class="flex-1 p-6 md:p-12 bg-slate-900 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h1 class="text-4xl font-black text-white mb-2">Control de Asientos</h1>
                        <p class="text-slate-400 flex items-center gap-2">
                            <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                            Servidor Render: Conectado
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-500 uppercase">Disponibles</p>
                        <p id="count-libres" class="text-4xl font-black text-blue-500">0</p>
                    </div>
                </div>

                <div class="bg-slate-800/40 p-8 md:p-12 rounded-[3.5rem] border border-slate-700/50 shadow-2xl relative">
                    <div class="w-3/4 h-1.5 bg-gradient-to-r from-transparent via-blue-500 to-transparent mx-auto mb-16 rounded-full shadow-[0_0_25px_rgba(59,130,246,0.5)]"></div>

                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 gap-6">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            document.getElementById('login-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            }, 300);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            
            // Actualizar Asientos
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                
                btn.className = `group relative h-24 rounded-[1.8rem] transition-all duration-300 border-2 flex flex-col items-center justify-center
                    ${ocupante 
                        ? (esMio ? 'bg-blue-600 border-blue-400 glow-blue' : 'bg-slate-800 border-rose-900/50 opacity-50 cursor-not-allowed') 
                        : 'bg-slate-800/50 border-slate-700 hover:border-emerald-500 hover:bg-slate-700/50'}`;
                
                btn.innerHTML = `
                    <span class="text-[10px] font-black mb-1 ${ocupante ? 'text-blue-100' : 'text-slate-500'}">${i + 1}</span>
                    <i class="fas ${ocupante ? (esMio ? 'fa-check-circle' : 'fa-minus-circle') : 'fa-couch'} text-xl"></i>
                    ${ocupante ? `<span class="text-[9px] mt-1 font-bold truncate max-w-[80%]">${ocupante}</span>` : ''}
                `;
                
                btn.onclick = () => { socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;

            // Actualizar Historial
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.forEach(item => {
                const log = document.createElement('div');
                log.className = "p-3 rounded-xl bg-slate-700/20 border border-slate-700/50 text-[11px] animate-fadeIn";
                log.innerHTML = `
                    <div class="flex justify-between text-slate-500 mb-1">
                        <span class="font-bold text-blue-400">${item.usuario}</span>
                        <span>${item.fecha}</span>
                    </div>
                    <span class="text-slate-300">${item.accion}</span>
                `;
                histDiv.appendChild(log);
            });
        });

        function reiniciar() {
            if(confirm('¿Reiniciar todo el sistema distribuido?')) socket.emit('limpiar_todo');
        }
    </script>
</body>
</html>
