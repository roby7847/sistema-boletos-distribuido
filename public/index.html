<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa | Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center p-4 transition-all duration-500">
        <div class="max-w-sm w-full bg-slate-900 p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center relative overflow-hidden">
            
            <div class="absolute -top-20 -left-20 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl"></div>

            <div class="relative z-10 w-32 h-32 bg-gradient-to-tr from-blue-700 to-indigo-600 rounded-full mx-auto mb-10 flex items-center justify-center shadow-2xl border-2 border-blue-500/30 overflow-hidden">
                <img src="/temazate.jpg.jpg" alt="Logo UIEPA" class="w-[85%] h-[85%] object-contain filter brightness-0 invert opacity-90">
            </div>

            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter">CineUiepa</h2>
            <p class="text-slate-500 text-[10px] mb-10 uppercase tracking-[0.2em] font-bold">Bienvenidos </p>
            
            <input type="text" id="username" placeholder="Tu nombre..." class="w-full bg-slate-800/50 border border-slate-700 rounded-2xl p-4 text-white text-center mb-5 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-600">
            
            <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                ACCEDER AL PANEL
            </button>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        
        <aside class="w-full md:w-72 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                    <i class="fas fa-network-wired text-white"></i>
                </div>
                <span class="font-black text-xl tracking-tighter text-white">CineUiepa</span>
            </div>

            <div class="space-y-4 mb-8">
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-1">Sesión de Usuario</p>
                    <p id="display-name" class="font-bold text-blue-400 text-lg">---</p>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <p class="text-[10px] uppercase font-bold text-slate-500 mb-3 tracking-widest flex items-center gap-2">
                    <i class="fas fa-stream text-[8px]"></i> Historial en tiempo real
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-2">
                    </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="reiniciar()" class="group bg-slate-800/50 hover:bg-rose-600/10 border border-slate-700 hover:border-rose-500/30 p-4 rounded-2xl transition-all flex items-center justify-center gap-3 w-full">
                    <i class="fas fa-redo-alt text-slate-500 group-hover:text-rose-500 group-hover:rotate-180 transition-all duration-500 text-xs"></i>
                    <span class="text-xs font-bold text-slate-400 group-hover:text-rose-500 uppercase">Reiniciar Tablero</span>
                </button>
                <button onclick="salir()" class="group bg-slate-800/20 hover:bg-slate-800 border border-slate-700 p-4 rounded-2xl transition-all flex items-center justify-center gap-3 w-full text-slate-500 hover:text-white">
                    <i class="fas fa-sign-out-alt text-xs"></i>
                    <span class="text-xs font-bold uppercase">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-12 bg-slate-950 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h1 class="text-4xl font-black text-white mb-2 tracking-tight">Selección de Asientos</h1>
                        <p class="text-slate-500 flex items-center gap-2 text-sm">
                            <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                            Red Distribuida UIEPA Activa
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Disponibles</p>
                        <p id="count-libres" class="text-5xl font-black text-blue-500">0</p>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-8 md:p-16 rounded-[4rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-4/5 h-1.5 bg-gradient-to-r from-transparent via-blue-500/50 to-transparent mx-auto mb-20 rounded-full shadow-[0_0_40px_rgba(59,130,246,0.4)]"></div>

                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 gap-6">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return alert("Por favor, ingresa tu nombre");
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            
            const login = document.getElementById('login-screen');
            login.style.opacity = '0';
            login.style.transform = 'scale(1.1)';
            
            setTimeout(() => {
                login.classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
            }, 500);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            
            // Renderizar Asientos
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                
                btn.className = `group relative h-28 rounded-[2rem] transition-all duration-300 border-2 flex flex-col items-center justify-center
                    ${ocupante 
                        ? (esMio ? 'bg-blue-600 border-blue-400 glow-blue scale-95 shadow-inner' : 'bg-slate-900 border-rose-900/40 opacity-40 cursor-not-allowed shadow-none') 
                        : 'bg-slate-800/30 border-slate-800 hover:border-emerald-500 hover:bg-slate-800/60 hover:scale-105 shadow-xl shadow-black/20'}`;
                
                btn.innerHTML = `
                    <span class="text-[10px] font-black mb-1.5 ${ocupante ? 'text-blue-100' : 'text-slate-600'}">${i + 1}</span>
                    <i class="fas ${ocupante ? (esMio ? 'fa-check-circle' : 'fa-user-lock') : 'fa-couch'} text-xl"></i>
                    ${ocupante ? `<span class="text-[9px] mt-2 font-bold truncate max-w-[80%] uppercase tracking-tighter">${ocupante}</span>` : ''}
                `;
                
                btn.onclick = () => { 
                    if(!ocupante || esMio) {
                        socket.emit('reservar', { index: i, usuario: miNombre }); 
                    }
                };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;

            // Renderizar Historial
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.forEach(item => {
                const log = document.createElement('div');
                log.className = "p-3 rounded-xl bg-slate-800/40 border border-slate-800/60 text-[10px] animate-fadeIn";
                log.innerHTML = `
                    <div class="flex justify-between text-slate-500 mb-1">
                        <span class="font-bold text-blue-500/80">${item.usuario}</span>
                        <span class="opacity-50">${item.fecha}</span>
                    </div>
                    <span class="text-slate-300 italic">${item.accion}</span>
                `;
                histDiv.appendChild(log);
            });
        });

        function reiniciar() {
            if(confirm('¿Quieres limpiar todo el tablero para la demostración?')) {
                socket.emit('limpiar_todo', { usuario: miNombre });
            }
        }

        function salir() {
            if(confirm('¿Cerrar tu sesión actual?')) {
                miNombre = ""; 
                document.getElementById('username').value = ""; 
                document.getElementById('main-panel').classList.add('hidden'); 
                const login = document.getElementById('login-screen');
                login.classList.remove('hidden'); 
                login.style.opacity = '1';
                login.style.transform = 'scale(1)';
            }
        }
    </script>
</body>
</html>
