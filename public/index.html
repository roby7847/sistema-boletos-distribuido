<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineUiepa  | Sistemas Distribuidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glow-blue { box-shadow: 0 0 35px rgba(59, 130, 246, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .bg-grid { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen text-slate-200 overflow-hidden font-sans bg-grid">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center p-4 transition-all duration-700">
        <div class="max-w-sm w-full bg-slate-900/95 backdrop-blur-xl p-10 rounded-[3rem] border border-slate-800 shadow-2xl text-center relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-600/20 rounded-full blur-3xl"></div>
            
            <div class="relative z-10 w-24 h-24 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl border border-blue-400/30 rotate-3">
                <i class="fas fa-network-wired text-4xl text-white"></i>
            </div>

            <h2 class="text-3xl font-black mb-1 text-white tracking-tighter uppercase">CineUiepa</h2>
            <p class="text-blue-500 text-[10px] mb-8 uppercase tracking-[0.4em] font-black italic">ITI - Sistemas Distribuidos</p>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Tu nombre de usuario..." 
                    class="w-full bg-slate-800/80 border border-slate-700 rounded-2xl p-4 text-white text-center focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-600">
                <button onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-white shadow-lg transition-all active:scale-95 uppercase tracking-widest">
                    Acceder al Nodo
                </button>
            </div>
            <p class="mt-8 text-[9px] text-slate-500 font-bold uppercase">UIEPA Ahuacatlán</p>
        </div>
    </div>

    <div id="main-panel" class="hidden flex flex-col md:flex-row h-screen">
        
        <aside class="w-full md:w-80 bg-slate-900/70 backdrop-blur-md border-r border-slate-800 p-8 flex flex-col">
            <div class="flex items-center gap-4 mb-10">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-server text-white"></i>
                </div>
                <div>
                    <span class="block font-black text-xl tracking-tighter text-white">CineUiepa</span>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span id="ping-text" class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Latencia: 0ms</span>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <div class="bg-slate-800/40 p-5 rounded-[2rem] border border-slate-700/30 mb-8">
                    <p class="text-[9px] uppercase font-black text-slate-500 mb-2">Usuario Conectado</p>
                    <p id="display-name" class="font-bold text-white text-lg italic">---</p>
                </div>

                <p class="text-[10px] uppercase font-black text-slate-500 mb-4 tracking-widest flex items-center gap-2">
                    <i class="fas fa-list-ul text-[8px]"></i> Bitácora de Eventos (E.D.)
                </p>
                <div id="historial" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800 space-y-3">
                <button onclick="exportarBitacora()" class="bg-blue-600/10 hover:bg-blue-600/20 border border-blue-500/30 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-blue-400 uppercase flex items-center justify-center gap-3">
                    <i class="fas fa-file-download"></i> Exportar Reporte
                </button>
                <button onclick="reiniciar()" class="bg-rose-600/10 hover:bg-rose-600/20 border border-rose-500/20 p-4 rounded-2xl transition-all w-full text-[10px] font-black text-rose-500 uppercase flex items-center justify-center gap-3">
                    <i class="fas fa-sync-alt"></i> Limpiar Servidor
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-16 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-end mb-12">
                    <div class="text-left">
                        <h1 class="text-5xl font-black text-white mb-2 tracking-tighter uppercase italic">Control de Sala</h1>
                        <p class="text-slate-500 text-[10px] font-black tracking-[0.3em]">Sistemas Distribuidos • Protocolo TCP/IP</p>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 p-6 px-10 rounded-[2.5rem] glow-blue">
                        <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Disponibilidad</p>
                        <p id="count-libres" class="text-5xl font-black text-blue-500 leading-none">0</p>
                    </div>
                </div>

                <div class="bg-slate-900/40 p-10 md:p-20 rounded-[5rem] border border-slate-800/50 shadow-2xl relative">
                    <div class="w-2/3 h-1.5 bg-gradient-to-r from-transparent via-blue-500 to-transparent mx-auto mb-24 rounded-full shadow-[0_0_60px_rgba(59,130,246,0.6)]"></div>
                    
                    <div id="grid-asientos" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-8"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let miNombre = "";
        let logsParaExportar = [];

        function entrar() {
            const input = document.getElementById('username');
            if(input.value.trim().length < 2) return;
            miNombre = input.value.trim();
            document.getElementById('display-name').innerText = miNombre;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
            iniciarPing();
        }

        // Monitor de Red (Demuestra Programación en Red)
        function iniciarPing() {
            setInterval(() => {
                const start = Date.now();
                socket.volatile.emit("ping", () => {
                    const latency = Date.now() - start;
                    document.getElementById('ping-text').innerText = `Latencia: ${latency}ms`;
                });
            }, 3000);
        }

        socket.on('actualizar', (data) => {
            const { asientos, historial } = data;
            logsParaExportar = historial;
            
            const grid = document.getElementById('grid-asientos');
            grid.innerHTML = '';
            let libres = 0;

            asientos.forEach((ocupante, i) => {
                if(!ocupante) libres++;
                const btn = document.createElement('button');
                const esMio = ocupante === miNombre;
                
                btn.className = `h-32 rounded-[2.5rem] border-2 flex flex-col items-center justify-center transition-all duration-300
                    ${ocupante 
                        ? (esMio ? 'bg-blue-600 border-blue-400 shadow-xl scale-95' : 'bg-slate-900/50 border-slate-800 opacity-20 cursor-not-allowed') 
                        : 'bg-slate-800/40 border-slate-700 hover:border-emerald-500 hover:bg-slate-800 hover:scale-105'}`;
                
                btn.innerHTML = `
                    <span class="text-[10px] font-black mb-2 ${ocupante ? 'text-blue-100' : 'text-slate-600'}">A-${i + 1}</span>
                    <i class="fas fa-couch text-2xl"></i>
                    ${ocupante ? `<span class="text-[9px] mt-3 font-black uppercase truncate px-2 w-full text-center">${ocupante}</span>` : ''}
                `;
                
                btn.onclick = () => { socket.emit('reservar', { index: i, usuario: miNombre }); };
                grid.appendChild(btn);
            });

            document.getElementById('count-libres').innerText = libres;
            const histDiv = document.getElementById('historial');
            histDiv.innerHTML = '';
            historial.slice().reverse().forEach(item => {
                const log = document.createElement('div');
                log.className = "p-4 rounded-2xl bg-slate-800/40 border border-slate-700/30 text-[10px] animate-fadeIn";
                log.innerHTML = `<div class="flex justify-between mb-1"><span class="font-black text-blue-400">${item.usuario}</span><span class="opacity-40 font-mono">${item.fecha}</span></div><span class="text-slate-300">${item.accion}</span>`;
                histDiv.appendChild(log);
            });
        });

        // Función de Persistencia (Punto 1 y 4)
        function exportarBitacora() {
            let contenido = "REPORTE DE SISTEMA DISTRIBUIDO - CINEUIEPA\n\n";
            logsParaExportar.forEach(l => contenido += `[${l.fecha}] ${l.usuario}: ${l.accion}\n`);
            const blob = new Blob([contenido], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "bitacora_distribuida.txt";
            link.click();
        }

        function reiniciar() { if(confirm('¿Reiniciar estado global del servidor?')) socket.emit('limpiar_todo', { usuario: miNombre }); }
        function salir() { location.reload(); }
    </script>
</body>
</html>
